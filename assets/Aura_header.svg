<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07080d" />
      <stop offset="100%" stop-color="#111622" />
    </linearGradient>
    
    <linearGradient id="aura-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" /> <stop offset="50%" stop-color="#f43f5e" /> <stop offset="100%" stop-color="#3b82f6" /> </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <pattern id="pixel-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2638" stroke-width="0.7" opacity="0.6" />
    </pattern>
  </defs>

  <rect width="1200" height="400" fill="url(#bg-grad)" />
  <rect width="1200" height="400" fill="url(#pixel-grid)" />

  <circle cx="950" cy="200" r="160" fill="#a855f7" opacity="0.12" filter="url(#glow)" />
  <circle cx="1100" cy="120" r="120" fill="#3b82f6" opacity="0.12" filter="url(#glow)" />
  <circle cx="750" cy="280" r="100" fill="#f43f5e" opacity="0.08" filter="url(#glow)" />

  <g transform="translate(720, 80)" opacity="0.85">
    <path d="M -40,120 L 80,120 L 140,60 L 280,60" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="4 4" />
    <path d="M -40,120 L 80,120 L 140,180 L 280,180" fill="none" stroke="#f43f5e" stroke-width="2" opacity="0.7" />
    <path d="M 80,120 L 280,120" fill="none" stroke="#a855f7" stroke-width="1.5" />

    <rect x="-40" y="70" width="100" height="100" rx="8" fill="#151b2c" stroke="#334155" stroke-width="1.5" />
    <text x="10" y="124" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" letter-spacing="1">DPB</text>
    <rect x="-30" y="145" width="20" height="6" rx="2" fill="#a855f7" opacity="0.6"/>
    <rect x="-5" y="145" width="20" height="6" rx="2" fill="#3b82f6" opacity="0.6"/>

    <rect x="130" y="15" width="120" height="90" rx="10" fill="#0b0f19" stroke="url(#aura-grad)" stroke-width="2" filter="url(#glow)" />
    <text x="190" y="54" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="800" text-anchor="middle" letter-spacing="1">VULKAN KHR</text>
    <text x="190" y="74" fill="#a855f7" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">YCbCr SAMPLER</text>

    <rect x="130" y="145" width="120" height="85" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5" opacity="0.9" />
    <path d="M 145,205 L 175,170 L 205,195 L 225,180 L 235,205 Z" fill="#10b981" opacity="0.15" />
    <text x="190" y="195" fill="#34d399" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="0.5">ZERO-COPY</text>
  </g>

  <g transform="translate(90, 150)">
    <text x="0" y="30" fill="url(#aura-grad)" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" letter-spacing="6">AURA</text>
    
    <text x="5" y="78" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" letter-spacing="0.5">
      Ultra-fast Vulkan Video Decoding Engine
    </text>

    <g transform="translate(5, 110)">
      <rect x="0" y="0" width="60" height="24" rx="5" fill="#2d1607" stroke="#ea580c" stroke-width="1" />
      <text x="30" y="16" fill="#ffedd5" font-family="ui-monospace, monospace" font-size="11" font-weight="bold" text-anchor="middle">Rust</text>

      <rect x="70" y="0" width="75" height="24" rx="5" fill="#2a0f10" stroke="#f43f5e" stroke-width="1" />
      <text x="107.5" y="16" fill="#ffe4e6" font-family="ui-monospace, monospace" font-size="11" font-weight="bold" text-anchor="middle">Vulkan</text>

      <rect x="155" y="0" width="105" height="24" rx="5" fill="#091e3a" stroke="#3b82f6" stroke-width="1" />
      <text x="207.5" y="16" fill="#dbeafe" font-family="ui-monospace, monospace" font-size="11" font-weight="bold" text-anchor="middle">GPU-Accelerated</text>
    </g>
  </g>
</svg>
