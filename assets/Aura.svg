<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Fluid Color-Shifting Gradient (SMIL Animation for true gradient morphing) -->
    <linearGradient id="aura-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7">
        <animate attributeName="stop-color" values="#a855f7; #f43f5e; #00f2fe; #7c3aed; #a855f7" dur="8s" repeatCount="indefinite" />
      </stop> 
      <stop offset="100%" stop-color="#f43f5e">
        <animate attributeName="stop-color" values="#f43f5e; #00f2fe; #7c3aed; #a855f7; #f43f5e" dur="8s" repeatCount="indefinite" />
      </stop> 
    </linearGradient>
    
    <!-- Smooth Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* CSS classes to isolate transitions and support hardware acceleration */
    .logo-mark {
      animation: logo-float 5s ease-in-out infinite alternate;
    }
    
    .aurora-stroke {
      animation: aura-glow 4s ease-in-out infinite alternate;
    }

    .flow-dashes {
      animation: dash-flow 3s linear infinite;
    }

    .pulse-core {
      animation: core-breath 3s ease-in-out infinite alternate;
    }

    .pulse-ring {
      animation: ripple 2.5s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
      transform-origin: 0px -60px; /* Pivots exactly on center node coordinate */
    }

    /* Animation Keyframes */
    @keyframes logo-float {
      0% { transform: translateY(-8px); }
      100% { transform: translateY(8px); }
    }

    @keyframes aura-glow {
      0% { stroke-width: 24; filter: opacity(0.85); }
      100% { stroke-width: 26; filter: opacity(1); }
    }

    @keyframes dash-flow {
      /* Loop seamlessly: 40px corresponds to stroke-dasharray (25 + 15) */
      to { stroke-dashoffset: -40; }
    }

    @keyframes core-breath {
      0% { transform: scale(0.95); opacity: 0.9; }
      100% { transform: scale(1.05); opacity: 1; }
    }

    @keyframes ripple {
      0% {
        transform: scale(0.5);
        opacity: 0.8;
      }
      100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }
  </style>

  <!-- Dark Cosmic Canvas Background -->
  <rect width="512" height="512" fill="#07080d" rx="40" />

  <!-- Base Translation Group (Static coordinate placement) -->
  <g transform="translate(256, 256)">
    
    <!-- Floating Animation Group (Holds the filtered graphic markers) -->
    <g class="logo-mark" filter="url(#glow)">
      
      <!-- Main "A" Outer Stroke (Gradient animated by SMIL) -->
      <path class="aurora-stroke" d="M -90,120 L -10, -110 L 10, -110 L 90, 120" 
            fill="none" stroke="url(#aura-grad)" stroke-width="25" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Inner Dashed Data Path (Animate flow via dash-offset) -->
      <path class="flow-dashes" d="M -70,50 L 0, -60 L 70, 50" 
            fill="none" stroke="#a855f7" stroke-width="10" stroke-linecap="round" stroke-dasharray="25 15" opacity="0.65"/>
      
      <!-- Outward expanding ripple ring (Transforms and scales outwards from center node) -->
      <circle class="pulse-ring" cx="0" cy="-60" r="30" fill="none" stroke="#f43f5e" stroke-width="2" />

      <!-- Glowing Central Core Node -->
      <circle class="pulse-core" cx="0" cy="-60" r="15" fill="#f43f5e" style="transform-origin: 0px -60px;" />

    </g>
  </g>
</svg>