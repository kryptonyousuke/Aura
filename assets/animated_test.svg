<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06080e"/>
      <stop offset="50%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0c111f"/>
    </linearGradient>

    <!-- Glowing Accents (Soft Radial Glows) -->
    <radialGradient id="glow-vulkan" cx="20%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ff4500" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#ff4500" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-rust" cx="80%" cy="80%" r="65%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-cyan" cx="85%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-core" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>

    <!-- Dynamic Colorful Title Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="35%" stop-color="#00f2fe" />
      <stop offset="70%" stop-color="#9d4edd" />
      <stop offset="100%" stop-color="#ff4500" />
    </linearGradient>

    <!-- Pipeline accents and general UI highlights gradient -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4500" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <!-- Patterns & Filters -->
    <pattern id="dot-grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.04" />
    </pattern>

    <filter id="blur-effect" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="35" />
    </filter>
    
    <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Fade-out mask for the dot grid -->
    <linearGradient id="fade-mask" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="20%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>

    <mask id="grid-mask">
      <rect width="1200" height="400" fill="url(#fade-mask)" />
    </mask>
  </defs>

  <style>
    /* CSS animations with isolated transformation contexts */
    .animated-pulse {
      animation: pulse-glow 6s ease-in-out infinite;
    }
    .flow-dash {
      stroke-dasharray: 8, 12;
      animation: dash-move 30s linear infinite;
    }
    .flow-dash-reverse {
      stroke-dasharray: 6, 10;
      animation: dash-move-reverse 20s linear infinite;
    }
    .float-yuv {
      animation: float-3d 6s ease-in-out infinite alternate;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.35; }
    }
    @keyframes dash-move {
      to { stroke-dashoffset: -1000; }
    }
    @keyframes dash-move-reverse {
      to { stroke-dashoffset: 1000; }
    }
    /* Simple floating translation without wiping out coordinate positioning of parent */
    @keyframes float-3d {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-12px); }
    }
  </style>

  <!-- Base Canvas -->
  <rect width="1200" height="400" fill="url(#bg-grad)" />
  
  <!-- Glowing Background Ambience -->
  <rect width="1200" height="400" fill="url(#glow-vulkan)" />
  <rect width="1200" height="400" fill="url(#glow-rust)" />
  <rect width="1200" height="400" fill="url(#glow-cyan)" />
  <circle cx="950" cy="200" r="180" fill="url(#glow-core)" filter="url(#blur-effect)" class="animated-pulse" />

  <!-- Grid system -->
  <rect width="1200" height="400" fill="url(#dot-grid)" mask="url(#grid-mask)" />

  <!-- Left Side: Typography & Metadata -->
  <g font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" transform="translate(100, 0)">
    
    <!-- Tech Category Indicator -->
    <text x="0" y="85" font-size="11" font-weight="800" fill="#00f2fe" letter-spacing="4" opacity="0.9">PROJECT // CORE_ENGINE</text>
    
    <!-- Title "AURA" with dropping shadow and new vibrant gradient -->
    <text x="0" y="185" font-size="86" font-weight="900" letter-spacing="18" fill="url(#text-grad)" filter="drop-shadow(0px 10px 20px rgba(0,0,0,0.4))">AURA</text>
    
    <!-- Dynamic horizontal accent indicator line -->
    <rect x="6" y="210" width="160" height="4" rx="2" fill="url(#accent-grad)" />
    
    <!-- Subtitle -->
    <text x="6" y="258" font-size="21" font-weight="500" fill="#94a3b8" letter-spacing="0.2">
      Ultra-fast Vulkan Video Decoding Framework
    </text>

    <!-- Premium Pill Badges -->
    <g transform="translate(6, 305)" font-size="10" font-weight="700" letter-spacing="2">
      
      <!-- Badge 1: Vulkan KHR -->
      <g transform="translate(0, -12)">
        <rect x="0" y="0" width="112" height="24" rx="12" fill="#ff4500" fill-opacity="0.08" stroke="#ff4500" stroke-opacity="0.35" stroke-width="1.2"/>
        <text x="56" y="15" fill="#ff7a45" text-anchor="middle">VULKAN KHR</text>
      </g>
      
      <!-- Badge 2: Rust Bindings -->
      <g transform="translate(126, -12)">
        <rect x="0" y="0" width="128" height="24" rx="12" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="1.2"/>
        <text x="64" y="15" fill="#a78bfa" text-anchor="middle">RUST BINDINGS</text>
      </g>

      <!-- Badge 3: GPU Accelerated -->
      <g transform="translate(268, -12)">
        <rect x="0" y="0" width="154" height="24" rx="12" fill="#00f2fe" fill-opacity="0.08" stroke="#00f2fe" stroke-opacity="0.35" stroke-width="1.2"/>
        <text x="77" y="15" fill="#22d3ee" text-anchor="middle">GPU ACCELERATED</text>
      </g>
    </g>
  </g>

  <!-- Right Side: Complex Video Decoding Pipeline Schematic -->
  
  <!-- 1. Background Pipeline Grid & Active Data Busses -->
  <g stroke="url(#accent-grad)" fill="none" opacity="0.15" stroke-width="1.5">
    <path d="M 680,240 L 760,240 Q 820,240 840,180" class="flow-dash-reverse" />
    <path d="M 680,200 L 780,200 Q 820,200 840,160" />
    <path d="M 680,160 L 780,160 Q 820,160 840,140" class="flow-dash" />
  </g>

  <!-- 2. Interactive Processing Channels (H.264, AV1, H.265 lanes) -->
  <g transform="translate(680, 80)">
    <!-- H.264 Lane -->
    <g transform="translate(0, 0)" opacity="0.4">
      <line x1="0" y1="20" x2="110" y2="20" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4" />
      <rect x="110" y="0" width="115" height="40" rx="6" fill="#0c111f" stroke="#94a3b8" stroke-width="1" />
      <text x="167" y="24" fill="#94a3b8" font-family="monospace" font-size="10" font-weight="700" letter-spacing="1" text-anchor="middle">H.264 / AVC</text>
      <circle cx="110" cy="20" r="3.5" fill="#94a3b8" />
    </g>

    <!-- AV1 HW Engine (Highlighted, Active Lane) -->
    <g transform="translate(25, 60)" opacity="0.95">
      <line x1="-25" y1="20" x2="85" y2="20" stroke="#00f2fe" stroke-width="2" class="flow-dash" />
      <rect x="85" y="0" width="135" height="40" rx="8" fill="#090d18" stroke="#00f2fe" stroke-width="1.8" filter="url(#glow-heavy)" />
      <text x="152" y="25" fill="#00f2fe" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" letter-spacing="1.5" text-anchor="middle">AV1 HARDWARE</text>
      <circle cx="85" cy="20" r="4.5" fill="#00f2fe" />
      <circle cx="220" cy="20" r="4.5" fill="#7c3aed" />
      <path d="M 220,20 Q 255,20 280,60" stroke="url(#accent-grad)" stroke-width="2.5" fill="none" class="flow-dash" />
    </g>

    <!-- H.265 Lane -->
    <g transform="translate(0, 120)" opacity="0.4">
      <line x1="0" y1="20" x2="110" y2="20" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 4" />
      <rect x="110" y="0" width="115" height="40" rx="6" fill="#0c111f" stroke="#94a3b8" stroke-width="1" />
      <text x="167" y="24" fill="#94a3b8" font-family="monospace" font-size="10" font-weight="700" letter-spacing="1" text-anchor="middle">H.265 / HEVC</text>
      <circle cx="110" cy="20" r="3.5" fill="#94a3b8" />
    </g>
  </g>

  <!-- 3. Hardware Video Decoded Frame Buffer (Floating 3D YUV planes with nested position isolation) -->
  <g transform="translate(940, 165)">
    <!-- Animating group floats independently of base translation coordinates -->
    <g class="float-yuv">
      
      <!-- Isometric Projection Container -->
      <g transform="rotate(-15) skewX(25) scale(0.9)">
        
        <!-- V (Chroma) Plane (Top Layer) -->
        <g transform="translate(-40, -40)" opacity="0.8">
          <rect x="0" y="0" width="120" height="90" rx="8" fill="#0a0f1d" fill-opacity="0.85" stroke="#ff4500" stroke-width="1.5" filter="url(#glow-heavy)"/>
          <rect x="10" y="10" width="100" height="70" rx="4" fill="none" stroke="#ff4500" stroke-opacity="0.15" stroke-width="1"/>
          <line x1="25" y1="45" x2="95" y2="45" stroke="#ff4500" stroke-opacity="0.3" stroke-width="1" />
          <line x1="60" y1="15" x2="60" y2="75" stroke="#ff4500" stroke-opacity="0.3" stroke-width="1" />
          <text x="15" y="24" fill="#ff7a45" font-family="monospace" font-size="11" font-weight="800">PLANE_V</text>
        </g>

        <!-- U (Chroma) Plane (Middle Layer) -->
        <g transform="translate(-20, -20)" opacity="0.85">
          <rect x="0" y="0" width="120" height="90" rx="8" fill="#0a0f1d" fill-opacity="0.85" stroke="#7c3aed" stroke-width="1.5" filter="url(#glow-heavy)"/>
          <rect x="10" y="10" width="100" height="70" rx="4" fill="none" stroke="#7c3aed" stroke-opacity="0.15" stroke-width="1"/>
          <line x1="25" y1="45" x2="95" y2="45" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1" />
          <line x1="60" y1="15" x2="60" y2="75" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1" />
          <text x="15" y="24" fill="#a78bfa" font-family="monospace" font-size="11" font-weight="800">PLANE_U</text>
        </g>

        <!-- Y (Luma) Plane (Bottom Layer) -->
        <g transform="translate(0, 0)" opacity="0.9">
          <rect x="0" y="0" width="120" height="90" rx="8" fill="#0a0f1d" fill-opacity="0.9" stroke="#00f2fe" stroke-width="2" filter="url(#glow-heavy)"/>
          <rect x="10" y="10" width="100" height="70" rx="4" fill="none" stroke="#00f2fe" stroke-opacity="0.2" stroke-width="1"/>
          <polygon points="45,30 85,45 45,60" fill="none" stroke="url(#accent-grad)" stroke-width="2" stroke-linejoin="round" />
          <polygon points="50,38 75,45 50,52" fill="url(#accent-grad)" opacity="0.3" />
          <text x="15" y="24" fill="#00f2fe" font-family="monospace" font-size="11" font-weight="800">PLANE_Y</text>
        </g>

      </g>
      
      <!-- YUV Pipeline Label (Flat alignment on bottom of 3D stack) -->
      <text x="20" y="115" fill="#e2e8f0" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" letter-spacing="3" text-anchor="middle" opacity="0.8">YUV OUTPUT FRAME</text>
    </g>
  </g>

  <!-- Framing Grid Corners -->
  <g stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" opacity="0.4">
    <path d="M 30,20 L 15,20 L 15,35" fill="none"/>
    <path d="M 1170,20 L 1185,20 L 1185,35" fill="none"/>
    <path d="M 15,365 L 15,380 L 30,380" fill="none"/>
    <path d="M 1185,365 L 1185,380 L 1170,380" fill="none"/>
  </g>
</svg>